name = "RoCourier"
client_id = "ec62c461418f2a1ece3f6e5fccc99154"
application_url = "https://YOUR-APP-URL.railway.app"
embedded = true
handle = "rocourier"

[build]
include_config_on_deploy = true

[access_scopes]
# Full list of required scopes
scopes = "read_orders,write_orders,read_shipping,write_shipping,write_fulfillments,read_fulfillments"

[auth]
redirect_urls = [
  "https://YOUR-APP-URL.railway.app/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders-create"

  [[webhooks.subscriptions]]
  topics = ["orders/updated"]
  uri = "/webhooks/orders-updated"

[app_proxy]
url = "https://YOUR-APP-URL.railway.app/proxy"
subpath = "rocourier"
prefix = "apps"

[pos]
embedded = false
