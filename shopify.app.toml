name = "Picklo"
client_id = "ec62c461418f2a1ece3f6e5fccc99154"
application_url = "https://rocourier-production.up.railway.app"
embedded = true
handle = "rocourier"

[build]

[access_scopes]
# Full list of required scopes
scopes = "read_orders,write_orders,read_customers,read_shipping,write_shipping,write_fulfillments,read_fulfillments"

[auth]
redirect_urls = [
  "https://rocourier-production.up.railway.app/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders-create"

  [[webhooks.subscriptions]]
  topics = ["orders/updated"]
  uri = "/webhooks/orders-updated"

  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri = "/webhooks/orders-cancelled"

  # GDPR mandatory webhooks
  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks/customers-data-request"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks/customers-redact"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks/shop-redact"

[app_proxy]
url = "https://rocourier-production.up.railway.app/proxy"
subpath = "rocourier"
prefix = "apps"

[pos]
embedded = false
